<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/output.css" />
    <title>Todo-List</title>
</head>
<body>
    <main>
        <section class="container column gap-10 w-full">
            <div class="row-start gap-4 w-full">
                <div class="bg-info rounded-full">
                    <img src="./assets/img/icons/to-do.svg" alt="to-do icon" class="size-10 p-1.5 md:size-15 md:p-3" />
                </div>
                <div class="column w-full">
                    <h1>my todo list</h1>
                    <div class="row-start gap-2">
                        <p><span class="remainTaskNum"></span> remaining - <span class="doneTaskNum"></span> done</p>
                    </div>
                </div>
            </div>
            <div class="column gap-5 w-full">
                <div class="panel bg-fg">
                    <form name="addTask" class="w-full row-start gap-1">
                        <input id="taskName" type="text" name="taskName" placeholder="new task..." class="placeholder-full-des panel bg-bg"/>
                        <button type="submit" class="button-primary row-start center addTaskBtn">
                            <img src="./assets/img/icons/plus.svg" alt="plus icon" class="size-5 sm:size-7"/>
                            add task
                        </button>
                    </form>
                </div>
                <div class="task-container w-full column gap-3">
                    
                </div>
            </div>
        </section>
    </main>
    <script src="./main.js"></script>
</body>
</html>
